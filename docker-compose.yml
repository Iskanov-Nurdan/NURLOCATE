services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pettrack
      POSTGRES_USER: pettrack
      POSTGRES_PASSWORD: pettrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - .env.example
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
    command: sh -c "python manage.py migrate && python manage.py migrate --run-syncdb && python manage.py seed_demo && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
